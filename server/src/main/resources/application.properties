server.port=8080
spring.web.resources.add-mappings=false
server.error.whitelabel.enabled=false

spring.datasource.url=jdbc:postgresql://localhost:5432/otodo
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jooq.sql-dialect=postgres

app.instance-no=001
app.inactive-user-max-age=365d
app.expired-user-max-age=365d
app.inactive-session-max-age=30d
app.signup-not-confirmed-user-max-age=2d
app.password-reset-token-max-age=1h

# Email settings
spring.application.name=OTodo
spring.mail.host=localhost
spring.mail.port=2500
app.default-email-sender=no-reply@test.com
app.url=http://localhost:8100
